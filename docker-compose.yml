services:
  postgres:
    image: postgres:16-alpine
    container_name: filedrop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-filedrop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filedrop}
      POSTGRES_DB: ${POSTGRES_DB:-filedrop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filedrop} -d ${POSTGRES_DB:-filedrop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    container_name: filedrop-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-filedrop}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-filedrop-secret}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./.data/rustfs:/data
