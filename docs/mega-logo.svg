<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110" role="img" aria-label="Mega">
  <style>
    .word { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 800; font-size: 64px; fill: #1e293b; }
    @media (prefers-color-scheme: dark) {
      .word { fill: #f8fafc; }
    }
  </style>
  <!-- three orange slashes -->
